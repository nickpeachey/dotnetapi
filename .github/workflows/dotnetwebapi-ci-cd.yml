name: dotnetwebapi-ci-cd

on:
  push:
    branches:
      - main
    paths:
      - DotnetWebApi/**
      - .github/workflows/dotnetwebapi-ci-cd.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/dotnetwebapi-api

permissions:
  contents: read
  packages: write

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore DotnetWebApi/DotnetWebApi.slnx

      - name: Build
        run: dotnet build DotnetWebApi/DotnetWebApi.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test DotnetWebApi/DotnetWebApi.slnx --configuration Release --no-build --verbosity normal

      - name: Compute image tag
        id: vars
        run: echo "image_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: DotnetWebApi
          file: DotnetWebApi/DotnetWebApi.Api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Checkout argo-cd-github repo
        uses: actions/checkout@v4
        with:
          repository: nickpeachey/argo-cd-github
          token: ${{ secrets.ARGOCD_REPO_TOKEN }}
          path: argo-cd-github

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.4.3

      - name: Update overlay image tag
        run: |
          cd argo-cd-github/argo-cd/apps/dotnetwebapi/overlays/local
          kustomize edit set image dotnetwebapi-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.image_tag }}

      - name: Commit and push kustomization update
        run: |
          cd argo-cd-github
          if git diff --quiet -- argo-cd/apps/dotnetwebapi/overlays/local/kustomization.yaml; then
            echo "No kustomization changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add argo-cd/apps/dotnetwebapi/overlays/local/kustomization.yaml
          git commit -m "chore: deploy dotnetwebapi image ${{ steps.vars.outputs.image_tag }}"
          git push
